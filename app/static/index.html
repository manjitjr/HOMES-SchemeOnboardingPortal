}

  token:localStorage.getItem('homes_token')||null,
  user:parseStoredUser(),
  sessionStartedAt:localStorage.getItem('homes_session_started_at')||null,
  view:'list', // list, detail, scheduling, users, field_management, notifications

// Role helpers
function hasRole(...roles){return S.user&&roles.some(r=>(S.user.roles||[]).includes(r))}
function isAdmin(){return hasRole('mto_admin')}

const TABS=['overview','mt_parameters','transactions','homes_functions','mt_bands','api_interfaces'];
const TAB_LABELS=['Scheme Overview','MT Parameters','Transaction Details','HOMES Functions','MT Bands','API & Batch Interfaces'];

// ════════════════════════════════════════
// API
// ════════════════════════════════════════
async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(S.token)h['Authorization']='Bearer '+S.token;
  const res=await fetch(path,{headers:h,...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  if(res.status===204)return null;
  const json=await res.json().catch(()=>null);
  if(!res.ok)throw new Error(json?.detail||json?.message||'Request failed');
  return json;
}

async function ensureAgenciesLoaded(){
  if(S.agencies&&S.agencies.length)return S.agencies;
  try{S.agencies=await api('/api/auth/agencies')}catch(_){S.agencies=[]}
  return S.agencies;
}

function toast(msg,type='success'){
  const d=document.createElement('div');
  const c={
    success:'border-emerald-200 bg-emerald-50 text-emerald-800',
    error:'border-red-200 bg-red-50 text-red-800',
    info:'border-brand-200 bg-brand-50 text-brand-800'
  };
  d.className=`toast pointer-events-auto w-full border rounded-xl px-4 py-3 text-sm font-medium shadow-md backdrop-blur ${c[type]||c.info}`;
  d.innerHTML=`
    <div class="flex items-start justify-between gap-3">
      <div class="flex items-start gap-2">
        <i class="mt-0.5 fas fa-${type==='success'?'circle-check':type==='error'?'triangle-exclamation':'circle-info'}"></i>
        <span>${esc(msg)}</span>
      </div>
      <button type="button" aria-label="Dismiss" class="text-gray-400 hover:text-gray-600" onclick="this.closest('.toast')?.remove()">
        <i class="fas fa-xmark"></i>
      </button>
    </div>`;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>{d.classList.add('toast-hide');setTimeout(()=>d.remove(),220)},3200);
}

// ════════════════════════════════════════
// AUTH
// ════════════════════════════════════════
async function doLogin(e){
  e.preventDefault();
  const u=e.target.username.value,p=e.target.password.value;
  try{
    const r=await api('/api/auth/login',{method:'POST',body:{username:u,password:p}});
    S.token=r.token;S.user=r.user;
    S.sessionStartedAt=new Date().toISOString();
    localStorage.setItem('homes_token',r.token);
    localStorage.setItem('homes_user',JSON.stringify(r.user));
    localStorage.setItem('homes_session_started_at',S.sessionStartedAt);
    toast('Welcome, '+S.user.display_name);
    render();
  }catch(err){toast(err.message,'error')}
}

function formatSessionDuration(startIso){
  if(!startIso)return '-';
  const start=parseAppDateTime(startIso);
  if(!start || Number.isNaN(start.getTime()))return '0m';
  const ms=Math.max(0,Date.now()-start.getTime());
  const totalSec=Math.floor(ms/1000);
  const h=Math.floor(totalSec/3600);
  const m=Math.floor((totalSec%3600)/60);
  const s=totalSec%60;
  const hh=String(h).padStart(2,'0');
  const mm=String(m).padStart(2,'0');
  const ss=String(s).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

async function logout(){
  const spent=formatSessionDuration(S.sessionStartedAt);
  const startedAt=S.sessionStartedAt?fmtDateTime(S.sessionStartedAt):'-';
  const endedAt=fmtDateTime(new Date().toISOString());
  openModal('Confirm Logout',`
    <div class="space-y-4">
      <p class="text-sm text-gray-600">You are about to log out.</p>
      <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700 space-y-1">
        <div><span class="font-semibold">Session started:</span> ${startedAt}</div>
        <div><span class="font-semibold">Current time:</span> ${endedAt}</div>
        <div><span class="font-semibold">Time spent on site:</span> ${spent}</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-1">
        <button onclick="closeModal()" class="px-3 py-2 rounded-lg text-xs bg-gray-100 hover:bg-gray-200 font-medium">Cancel</button>
        <button onclick="confirmLogout()" class="px-3 py-2 rounded-lg text-xs bg-red-600 hover:bg-red-700 text-white font-medium">Log out</button>
      </div>
    </div>`);
}

async function confirmLogout(){
  const spent=formatSessionDuration(S.sessionStartedAt);
  try{
    if(S.token)await api('/api/auth/logout',{method:'POST'});
  }catch(_){/* best-effort logout capture */}
  S.token=null;S.user=null;S.view='list';S.schemes=[];S.currentScheme=null;S.sessionStartedAt=null;
  localStorage.removeItem('homes_token');localStorage.removeItem('homes_user');
  localStorage.removeItem('homes_session_started_at');
  closeModal();
  render();
  toast(`Logged out. Time spent: ${spent}`,'info');
}

// ════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════
async function render(){
  try{
    const app=document.getElementById('app');
    if(!S.token||!S.user){app.innerHTML=renderLogin();return}
    if(S.view==='list'){app.innerHTML=renderListPage();loadSchemes();loadSchedulingData()}
    else if(S.view==='detail'){app.innerHTML=renderDetailPage()}
    else if(S.view==='scheduling'){app.innerHTML=renderSchedulingPage()}
    else if(S.view==='users'){await ensureAgenciesLoaded();app.innerHTML=renderUsersPage();loadUsers()}
    else if(S.view==='field_management'){app.innerHTML=renderFieldManagementPage()}
    else if(S.view==='notifications'){app.innerHTML=renderNotificationsPage();loadNotificationLogs()}
  }catch(e){
    console.error('Render error:', e);
    document.getElementById('app').innerHTML=`<div style="padding:20px;color:red;font-family:monospace"><strong>Error:</strong> ${e.message}</div>`;
  }
}

function parseAppDateTime(iso){
  if(!iso)return null;
  const normalized=/([zZ]|[+-]\d{2}:\d{2})$/.test(iso)?iso:`${iso}+08:00`;
  return new Date(normalized);
}

function fmtDateTime(iso){
  if(!iso)return '-';
  const d=parseAppDateTime(iso);
  if(!d || Number.isNaN(d.getTime()))return '-';
  return d.toLocaleString('en-SG', {timeZone:'Asia/Singapore',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}

function fmtDate(iso){
  if(!iso)return '-';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString([], {year:'numeric',month:'short',day:'numeric'});
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

function fmtChangeValue(v){
  v=coerceStructured(v);
  if(v===null||v===undefined||v===''||v==='None'||v==='null')return '<span class="px-1.5 py-0.5 rounded bg-amber-50 text-amber-700 border border-amber-200">blank</span>';
  if(typeof v==='object'){
    try{return esc(JSON.stringify(v));}catch(_){return esc(String(v));}
  }
  return esc(String(v));
}

function isObj(v){return v&&typeof v==='object'&&!Array.isArray(v)}

function coerceStructured(v){
  if(v===null||v===undefined)return v;
  if(typeof v!=='string')return v;
  const s=v.trim();
  if(!(s.startsWith('{')||s.startsWith('[')))return v;

  // Already valid JSON
  try{return JSON.parse(s)}catch(_){/* noop */}

  // Handle historical Python-like repr strings in stored logs
  try{
    const normalized=s
      .replace(/\bNone\b/g,'null')
      .replace(/\bTrue\b/g,'true')
      .replace(/\bFalse\b/g,'false')
      .replace(/'/g,'"');
    return JSON.parse(normalized);
  }catch(_){
    return v;
  }
}

function flattenObjectDiff(fieldBase,oldVal,newVal){
  const rows=[];
  function walk(path,o,n){
    if(isObj(o)||isObj(n)){
      const ok=isObj(o)?Object.keys(o):[];
      const nk=isObj(n)?Object.keys(n):[];
      const keys=[...new Set([...ok,...nk])].sort();
      keys.forEach(k=>walk(path?`${path}.${k}`:k,isObj(o)?o[k]:undefined,isObj(n)?n[k]:undefined));
      return;
    }
    if(Array.isArray(o)||Array.isArray(n)){
      const oa=Array.isArray(o)?o:[];
      const na=Array.isArray(n)?n:[];
      const len=Math.max(oa.length,na.length);
      for(let i=0;i<len;i++)walk(`${path}[${i}]`,oa[i],na[i]);
      return;
    }
    if((o??'')===(n??''))return;
    rows.push({field:path||fieldBase||'field',old:o,new:n});
  }
  walk(fieldBase||'',oldVal,newVal);
  return rows;
}

function normalizeChangeRows(changes){
  const out=[];
  (changes||[]).forEach(ch=>{
    const field=String(ch?.field||'field');
    const o=coerceStructured(ch?.old);
    const n=coerceStructured(ch?.new);
    if(isObj(o)||isObj(n)||Array.isArray(o)||Array.isArray(n)){
      const expanded=flattenObjectDiff(field,o,n);
      if(expanded.length)out.push(...expanded);
      else out.push({field,old:o,new:n});
    }else{
      out.push({field,old:o,new:n});
    }
  });
  return out;
}

function humanizeFieldToken(token){
  const t=String(token||'').trim();
  if(!t)return 'Field';
  if(FIELD_LABELS[t])return FIELD_LABELS[t];
  return t
    .replace(/_/g,' ')
    .replace(/\s+/g,' ')
    .replace(/\b\w/g,ch=>ch.toUpperCase());
}

function displayFieldName(field,tab){
  const f=String(field||'');
  const t=String(tab||'');
  let raw=f||'field';
  if(t&&raw.startsWith(t+'.'))raw=raw.slice(t.length+1);
  if(t&&raw.startsWith(t+'['))raw=raw.slice(t.length);

  const path=raw.replace(/\[(\d+)\]/g,'.$1').split('.').filter(Boolean);
  if(!path.length)return 'Field';

  const labels=path.map(p=>/^[0-9]+$/.test(p)?`Item ${parseInt(p,10)+1}`:humanizeFieldToken(p));
  return labels.join(' › ');
}

async function submitNewScheme(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  const body=Object.fromEntries(fd.entries());
  // background_info as JSON object
  if(body.background_info){
    try{body.background_info={notes:body.background_info}}catch(e){}
  } else { delete body.background_info; }
  try{
    const r=await api('/api/schemes',{method:'POST',body});
    toast('Scheme created in draft mode');
    closeModal();
    S.currentScheme=r.id;
    S.currentSchemeData=null;
    S.comments=[];
    S.changes=[];
    S.activeTab=0;
    S.tabData={};
    S.view='detail';
    render();
    await loadSchemeDetail();
  }catch(err){toast(err.message,'error')}
}

async function saveFieldGuidance(tab,field){
  const getVal=(id)=>document.getElementById(id)?.value||'';
  const getLines=(id)=>getVal(id).split('\n').map(l=>l.trim()).filter(Boolean);
  
  const body={
    inline_hint:getVal(`hint_${tab}_${field}`),
    popover_title:getVal(`title_${tab}_${field}`),
    popover_description:getVal(`desc_${tab}_${field}`),
    popover_do:getLines(`do_${tab}_${field}`),
    popover_dont:getLines(`dont_${tab}_${field}`),
    popover_examples:getLines(`ex_${tab}_${field}`)
  };
  
  try{
    await api(`/api/guidance/${tab}/${field}`,{method:'PUT',body});
    S.guidanceList=await api('/api/guidance');
    S.guidance={};
    S.guidanceList.forEach(g=>{S.guidance[`${g.tab_name}.${g.field_name}`]=g});

    renderFieldGuidanceContent();
  }catch(e){toast(e.message,'error')}
}

function renderSchedulingOverview(data){
  const content=document.getElementById('schedulingContent');
  if(!content)return;
  const totalBookings=(data.quarters||[]).reduce((sum,q)=>sum+(q.bookings?.length||0),0);
  const filledQuarters=(data.quarters||[]).filter(q=>(q.bookings?.length||0)>0).length;
  const stats=document.getElementById('scheduleStats');
  if(stats)stats.textContent=`${totalBookings} bookings across ${filledQuarters} of 4 onboarding windows`;
  
  // Color mapping for quarters - hardcoded for Tailwind safety
  const getQuarterClass=(month)=>{
    const colorMap={
      'January':{bg:'bg-blue-50',border:'border-blue-200',text:'text-blue-900',card:'bg-blue-50 border-blue-100'},
      'April':{bg:'bg-purple-50',border:'border-purple-200',text:'text-purple-900',card:'bg-purple-50 border-purple-100'},
      'July':{bg:'bg-green-50',border:'border-green-200',text:'text-green-900',card:'bg-green-50 border-green-100'},
      'November':{bg:'bg-orange-50',border:'border-orange-200',text:'text-orange-900',card:'bg-orange-50 border-orange-100'}
    };
    return colorMap[month]||{bg:'bg-gray-50',border:'border-gray-200',text:'text-gray-900',card:'bg-gray-50 border-gray-100'};
  };
  
  content.innerHTML=data.quarters.map(q=>{
    const colors=getQuarterClass(q.month_name);
    return `
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden schedule-col">
      <div class="${colors.bg} ${colors.border} border-b px-4 py-3 flex items-center justify-between">
        <h3 class="font-semibold ${colors.text}">${q.month_name}</h3>
        <span class="text-[11px] px-2 py-1 rounded-full bg-white/70 border ${colors.border} ${colors.text} font-semibold">${q.bookings.length} bookings</span>
      </div>
      <div class="p-4 space-y-3 schedule-col-body">
        ${q.bookings.length===0?
          `<p class="text-xs text-gray-400 text-center py-4">No bookings</p>`
          :q.bookings.map(b=>`
            <div class="border rounded-xl p-3 ${colors.card}">
              <div class="font-semibold text-sm text-gray-800">${esc(b.scheme_name||'Unknown')}</div>
              <div class="text-xs text-gray-600 mt-1">${esc(b.agency||'')}</div>
              <div class="text-xs text-gray-500 mt-2">
                <i class="fas fa-gears mr-1"></i>Tech: ${b.technical_go_live}
                <br>
                <i class="fas fa-briefcase mr-1"></i>Biz: ${b.business_go_live}
              </div>
              ${isAdmin()&&b.submission_id?`
                <div class="mt-3 pt-2 border-t border-gray-200">
                  <button onclick="confirmDeleteScheduleScheme('${b.submission_id}','${esc((b.scheme_name||'Unknown').replace(/'/g,"\\'"))}')" class="text-red-600 hover:text-red-700 text-xs font-semibold">
                    <i class="fas fa-trash mr-1"></i>Delete Scheme
                  </button>
                </div>
              `:''}
            </div>
          `).join('')
        }
      </div>
    </div>
    `;
  }).join('');
}

async function openScheme(id){
  S.currentScheme=id;S.activeTab=0;S.view='detail';S.tabData={};
  render();
  await loadSchemeDetail();
}

async function loadSchemeDetail(){
  try{
    const currentYear=new Date().getFullYear();
    const years=[currentYear,currentYear+1,currentYear+2];
    const [data,comments,changes,_guidance,...occ]=await Promise.all([
      api(`/api/schemes/${S.currentScheme}`),
      api(`/api/schemes/${S.currentScheme}/comments`).catch(()=>[]),
      api(`/api/schemes/${S.currentScheme}/changes`).catch(()=>[]),
      loadFieldGuidance().catch(()=>{}),
      ...years.map(y=>api(`/api/scheduling/overview/${y}`).catch(()=>null))
    ]);

    S.currentSchemeData=data;S.comments=comments||[];S.changes=changes||[];

    // Build slot occupancy map by year/month for capacity coloring
    S.slotOverviewByYear={};
    years.forEach((y,idx)=>{
      const monthCount={1:0,4:0,7:0,11:0};
      const quarters=occ[idx]?.quarters||[];
      quarters.forEach(q=>{monthCount[q.month]=(q.bookings||[]).length});
      S.slotOverviewByYear[y]=monthCount;
    });

    renderDetailContent();
  }catch(e){toast(e.message,'error');S.view='list';render()}
}

          <div class="kpi-card"><div class="kpi-label">Version</div><div class="kpi-value" style="font-size:1.2rem">${d.version||1}</div></div>

function tabHasData(i){
  const d=S.currentSchemeData;if(!d)return false;
  if(i===0)return !!(d.agency||d.scheme_name);
  const tn=TABS[i];
  return d[tn]&&typeof d[tn]==='object'&&Object.keys(d[tn]).length>0;
}

function switchTab(i){
  S.activeTab=i;
  renderDetailContent();
}

function isReadOnly(){
  const d=S.currentSchemeData;
  if(!d)return true;
  if(hasRole('mto_admin'))return false;
  if(hasRole('agency_creator')&&(d.status==='draft'||d.status==='rejected'))return false;
  if(hasRole('agency_approver')&&(d.status==='pending_review'||d.status==='rejected'))return false;
  return true;
}

function ro(){return isReadOnly()?'disabled':''}

function renderTabContent(){
  const el=document.getElementById('tabContent');
  if(!el)return;
  const fns=[renderTab0,renderTab1,renderTab2,renderTab3,renderTab4,renderTab5];
  el.innerHTML=fns[S.activeTab]();

// Helper: info tooltip
function tip(text){
  if(!text)return '';
  return `<span class="tooltip-trigger relative inline-block ml-1 cursor-help">
    <i class="fas fa-info-circle text-brand-400 text-xs"></i>
    <span class="tooltip-box hidden absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 bg-white border border-gray-200 rounded-lg shadow-lg text-xs text-gray-600 font-normal z-30">${esc(text)}</span>
  </span>`;
}

// Helper: form field
function ff(label,key,val,type='text',tipText='',extra=''){
  const v=val??'';const r=ro();
  const tabName=TABS[S.activeTab]||'overview';
  const hasGuidance=S.guidance[`${tabName}.${key}`]&&(S.guidance[`${tabName}.${key}`].popover_title||S.guidance[`${tabName}.${key}`].popover_description);
  return `<div class="${extra}">
    <label class="block text-xs font-medium text-gray-600 mb-1">
      ${label}
      ${hasGuidance?`<button type="button" onclick="showGuidancePopover('${tabName}','${key}',event)" class="ml-2 text-blue-500 hover:text-blue-700 transition" title="Learn more">(?)</button>`:''}
      ${tip(tipText)}
    </label>
    <input type="${type}" data-field="${key}" value="${esc(String(v))}" ${r}
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition disabled:bg-gray-50 disabled:text-gray-500" ${type==='number'?'step="any"':''}>
    ${renderHintText(tabName,key)}
  </div>`;
}

function fta(label,key,val,tipText='',rows=3){
  const v=val??'';const r=ro();
  const tabName=TABS[S.activeTab]||'overview';
  const hasGuidance=S.guidance[`${tabName}.${key}`]&&(S.guidance[`${tabName}.${key}`].popover_title||S.guidance[`${tabName}.${key}`].popover_description);
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">
      ${label}
      ${hasGuidance?`<button type="button" onclick="showGuidancePopover('${tabName}','${key}',event)" class="ml-2 text-blue-500 hover:text-blue-700 transition" title="Learn more">(?)</button>`:''}

function fsel(label,key,options,val,tipText=''){
  const r=ro();
  const tabName=TABS[S.activeTab]||'overview';
  const hasGuidance=S.guidance[`${tabName}.${key}`]&&(S.guidance[`${tabName}.${key}`].popover_title||S.guidance[`${tabName}.${key}`].popover_description);
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">
      ${label}
      ${hasGuidance?`<button type="button" onclick="showGuidancePopover('${tabName}','${key}',event)" class="ml-2 text-blue-500 hover:text-blue-700 transition" title="Learn more">(?)</button>`:''}

    </label>
    <select data-field="${key}" ${r} class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white transition disabled:bg-gray-50 disabled:text-gray-500">
      <option value="">-- Select --</option>
      ${options.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>
    ${renderHintText(tabName,key)}
  </div>`;
}

function fyn(label,key,val,tipText=''){
  return fsel(label,key,['Yes','No'],val,tipText);
}

function sectionHead(title,icon){
  return `<div class="flex items-center gap-2 pt-6 pb-3 border-b border-gray-100 mb-4 first:pt-0">
    <i class="fas ${icon||'fa-folder'} text-brand-500 text-sm"></i>
    <h3 class="text-sm font-semibold text-brand-900">${title}</h3>
  </div>`;
}

const MTC_MEMBER_STATUSES=['Overseas Studying','Overseas Working','Nursing Home','Incarcerated','Incarcerated Overseas','Deceased','Relocated Overseas','No longer in contact','Missing','Estranged'];
const MTC_SECTION_KEYS=['related','nuclear','parent_guardian','immediate_family','freeform'];

function statusFieldKey(status){
  return String(status||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
}

function getMtcSectionData(tabData,key){
  const nested=(tabData&&typeof tabData[key]==='object')?tabData[key]:{};
  const inclusion={...(nested.inclusion||{})};
  MTC_MEMBER_STATUSES.forEach(ms=>{
    const flatVal=tabData?.[`${key}_inclusion_${statusFieldKey(ms)}`];
    if(flatVal)inclusion[ms]=flatVal;
    if(!inclusion[ms])inclusion[ms]='Included';
  });
  return {
    used:nested.used??tabData?.[`${key}_used`]??'',
    construct:nested.construct??tabData?.[`${key}_construct`]??'',
    deviation:nested.deviation??tabData?.[`${key}_deviation`]??'',
    inclusion,
  };
}

function getTabData(tabName){
  const d=S.currentSchemeData;
  if(!d)return {};
  if(tabName==='overview')return d;
  // Ensure tab data object persists so mutations (addBandRow etc.) are kept
  if(!d[tabName]||typeof d[tabName]!=='object')d[tabName]={};
  return d[tabName];
}

function ensureTab5UiState(){
  if(!S.tab5Section)S.tab5Section='api';
  if(typeof S.tab5Search!=='string')S.tab5Search='';
  if(!S.tab5GroupOpen||typeof S.tab5GroupOpen!=='object')S.tab5GroupOpen={};
}

function syncTab5DraftFromDom(){
  if(S.activeTab!==5)return;
  const d=getTabData('api_interfaces');
  document.querySelectorAll('#tabContent [data-field]').forEach(el=>{
    const k=el.dataset.field;
    if(!k)return;
    if(el.tagName==='SELECT')d[k]=el.value;
    else if(el.type==='checkbox')d[k]=el.checked;
    else d[k]=el.value;
  });
}

function setTab5Section(section){
  syncTab5DraftFromDom();
  S.tab5Section=section;
  S.tab5Search='';
  renderTabContent();
}

function setTab5Search(value){
  syncTab5DraftFromDom();
  S.tab5Search=String(value||'');
  renderTabContent();
}

function tab5CategoryForName(name){
  const n=String(name||'').toLowerCase();
  if(n.includes('mshl'))return 'MSHL';
  if(n.includes('consent'))return 'Consent';
  if(n.includes('enquir'))return 'Enquiry';
  if(n.includes('mtc'))return 'MTC Query';
  if(n.includes('mt request'))return 'MT Request';
  if(n.includes('mt result'))return 'MT Result';
  return 'Others';
}

function isTab5GroupOpen(section,group){
  ensureTab5UiState();
  const key=`${section}|${group}`;
  if(!(key in S.tab5GroupOpen))S.tab5GroupOpen[key]=true;
  return !!S.tab5GroupOpen[key];
}

function toggleTab5Group(section,group){
  syncTab5DraftFromDom();
  const key=`${section}|${group}`;
  S.tab5GroupOpen[key]=!isTab5GroupOpen(section,group);
  renderTabContent();
}

function setTab5ToggleValue(field,enabled,clearMetrics=false){
  syncTab5DraftFromDom();
  const d=getTabData('api_interfaces');
  d[field]=enabled?'Yes':'No';
  if(clearMetrics&&!enabled&&field.endsWith('_used')){
    const base=field.replace(/_used$/,'');
    d[base+'_avg']='';
    d[base+'_peak']='';
  }
  renderTabContent();
}

function renderTab5(){
  ensureTab5UiState();
  const d=getTabData('api_interfaces');
  const apis=tab5ApiItems();
  const batches=tab5BatchItems();
  const sftpItems=tab5SftpItems();
  const r=ro();
  const isRead=isReadOnly();
  const q=(S.tab5Search||'').trim().toLowerCase();
  const groupOrder=['Consent','Enquiry','MTC Query','MT Request','MT Result','MSHL','Others'];

  const selectedApi=apis.filter(([code])=>d['api_'+code.replace(/-/g,'_')+'_used']==='Yes').length;
  const selectedBatch=batches.filter(([code])=>d['batch_'+code.replace(/-/g,'_')+'_used']==='Yes').length;
  const selectedSftp=sftpItems.filter(([key])=>d[key]==='Yes').length;

  const tabs=[
    {key:'api',label:'API',icon:'fa-plug',selected:selectedApi,total:apis.length},
    {key:'batch',label:'Batch',icon:'fa-database',selected:selectedBatch,total:batches.length},
    {key:'sftp',label:'SFTP',icon:'fa-folder-open',selected:selectedSftp,total:sftpItems.length},
  ];

  function rowToggle(field,enabled,clearMetrics=false){
    if(isRead){
      return `<span class="px-2 py-1 rounded-full text-[10px] font-semibold ${enabled?'bg-blue-100 text-blue-700 border border-blue-200':'bg-gray-100 text-gray-500 border border-gray-200'}">${enabled?'Enabled':'Disabled'}</span>`;
    }
    return `<div class="inline-flex border border-gray-200 rounded-lg overflow-hidden text-[10px] font-semibold">
      <button type="button" onclick="setTab5ToggleValue('${field}',true,${clearMetrics?'true':'false'})" class="px-2 py-1 ${enabled?'bg-blue-600 text-white':'bg-white text-gray-600 hover:bg-blue-50'}">On</button>
      <button type="button" onclick="setTab5ToggleValue('${field}',false,${clearMetrics?'true':'false'})" class="px-2 py-1 ${!enabled?'bg-gray-600 text-white':'bg-white text-gray-600 hover:bg-gray-100'}">Off</button>
    </div>`;
  }

  function renderGroupedInterface(items,type){
    const prefix=type==='api'?'api_':'batch_';
    const avgLabel=type==='api'?'Avg calls/hr':'Avg records/day';
    const peakLabel=type==='api'?'Peak calls/hr':'Peak records/day';

    const mapped=items.map(([code,name])=>{
      const key=code.replace(/-/g,'_');
      const usedField=`${prefix}${key}_used`;
      const avgField=`${prefix}${key}_avg`;
      const peakField=`${prefix}${key}_peak`;
      const enabled=d[usedField]==='Yes';
      return {code,name,usedField,avgField,peakField,enabled,group:tab5CategoryForName(name)};
    }).filter(x=>!q||x.code.toLowerCase().includes(q)||x.name.toLowerCase().includes(q));

    if(!mapped.length){
      return `<div class="text-sm text-gray-500 py-6 text-center border border-dashed border-gray-300 rounded-xl">No interfaces match your search.</div>`;
    }

    return groupOrder.map(group=>{
      const rows=mapped.filter(x=>x.group===group);
      if(!rows.length)return '';
      const open=isTab5GroupOpen(type,group);
      const selected=rows.filter(x=>x.enabled).length;
      return `
      <div class="border border-gray-200 rounded-xl overflow-hidden mb-3">
        <button type="button" onclick="toggleTab5Group('${type}','${group}')" class="w-full flex items-center justify-between px-4 py-3 bg-slate-50 hover:bg-slate-100 transition">
          <div class="flex items-center gap-2">
            <i class="fas ${open?'fa-chevron-down':'fa-chevron-right'} text-xs text-slate-500"></i>
            <span class="text-sm font-semibold text-slate-700">${group}</span>
          </div>
          <span class="text-[11px] text-slate-600">${selected}/${rows.length} enabled</span>
        </button>
        <div class="${open?'block':'hidden'} p-3 space-y-2 bg-white">
          ${rows.map(x=>`
          <div class="rounded-lg border ${x.enabled?'border-blue-200 bg-blue-50/40':'border-gray-200 bg-white'} p-3">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="text-[11px] font-mono text-slate-500">${x.code}</div>
                <div class="text-sm text-slate-800 font-medium">${x.name}</div>
              </div>
              ${rowToggle(x.usedField,x.enabled,true)}
            </div>

            <input type="hidden" data-field="${x.usedField}" value="${x.enabled?'Yes':'No'}">

            ${x.enabled?`
            <div class="grid grid-cols-2 gap-3 mt-3">
              <div>
                <label class="block text-[11px] text-slate-600 mb-1">${avgLabel}</label>
                <input type="number" data-field="${x.avgField}" value="${d[x.avgField]||''}" ${r} class="w-full border border-gray-200 rounded-lg px-2.5 py-2 text-xs disabled:bg-gray-50">
              </div>
              <div>
                <label class="block text-[11px] text-slate-600 mb-1">${peakLabel}</label>
                <input type="number" data-field="${x.peakField}" value="${d[x.peakField]||''}" ${r} class="w-full border border-gray-200 rounded-lg px-2.5 py-2 text-xs disabled:bg-gray-50">
              </div>
            </div>
            `:`
            <input type="hidden" data-field="${x.avgField}" value="${d[x.avgField]||''}">
            <input type="hidden" data-field="${x.peakField}" value="${d[x.peakField]||''}">
            <div class="mt-2 text-[11px] text-slate-500">Enable to provide volume estimates.</div>
            `}
          </div>
          `).join('')}
        </div>
      </div>`;
    }).join('');
  }

  function renderSftpSection(){
    const filtered=sftpItems.filter(([k,name])=>!q||k.toLowerCase().includes(q)||name.toLowerCase().includes(q));
    if(!filtered.length){
      return `<div class="text-sm text-gray-500 py-6 text-center border border-dashed border-gray-300 rounded-xl">No SFTP items match your search.</div>`;
    }
    return `<div class="space-y-2">
      ${filtered.map(([field,name],idx)=>{
        const enabled=d[field]==='Yes';
        return `<div class="rounded-lg border ${enabled?'border-blue-200 bg-blue-50/40':'border-gray-200 bg-white'} px-3 py-2.5 flex items-center justify-between gap-3">
          <div>
            <div class="text-sm text-slate-800">${idx+1}. ${name}</div>
            <div class="text-[11px] text-slate-500">${field}</div>
          </div>
          <div>
            ${rowToggle(field,enabled,false)}
            <input type="hidden" data-field="${field}" value="${enabled?'Yes':'No'}">
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  const active=tabs.find(t=>t.key===S.tab5Section)||tabs[0];
  return `
  ${sectionHead('API & Batch Interfaces','fa-plug')}
  <div class="rounded-xl border border-gray-200 bg-white p-4 mb-4">
    <div class="flex flex-wrap items-center gap-2 mb-3">
      ${tabs.map(t=>`
        <button type="button" onclick="setTab5Section('${t.key}')" class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition ${S.tab5Section===t.key?'bg-brand-600 text-white border-brand-600':'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}">
          <i class="fas ${t.icon} mr-1"></i>${t.label}
          <span class="ml-1 ${S.tab5Section===t.key?'text-white/90':'text-gray-500'}">${t.selected}/${t.total}</span>
        </button>
      `).join('')}
    </div>

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-3">
      <div class="text-xs text-slate-600">
        <span class="font-semibold">Summary:</span> ${active.selected} of ${active.total} ${active.label} interfaces enabled
      </div>
      <div class="relative w-full md:w-72">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
        <input type="text" value="${esc(S.tab5Search||'')}" oninput="setTab5Search(this.value)" placeholder="Search ${active.label} interfaces..." class="w-full border border-gray-200 rounded-lg pl-8 pr-3 py-2 text-xs">
      </div>
    </div>

    ${S.tab5Section==='api'?renderGroupedInterface(apis,'api'):''}
    ${S.tab5Section==='batch'?renderGroupedInterface(batches,'batch'):''}
    ${S.tab5Section==='sftp'?renderSftpSection():''}
  </div>`;
}

// COLLECT TAB DATA
// ════════════════════════════════════════
function collectTabData(){
  const data={};
  // Standard fields
  document.querySelectorAll('#tabContent [data-field]').forEach(el=>{
    const k=el.dataset.field;
    if(el.tagName==='SELECT')data[k]=el.value;
    else if(el.type==='checkbox')data[k]=el.checked;
    else data[k]=el.value;
  });
  // Band rows
  if(S.activeTab===4){
    const bands=[];
    document.querySelectorAll('#bandsBody tr[data-band]').forEach(tr=>{
      const b={};
      tr.querySelectorAll('[data-band-field]').forEach(el=>{
        b[el.dataset.bandField]=el.tagName==='SELECT'?el.value:el.value;
      });
      bands.push(b);
    });
    data.bands=bands;
    const rankings=[];
    document.querySelectorAll('#rankingsBody tr[data-rank]').forEach(tr=>{
      const r={};
      tr.querySelectorAll('[data-rank-field]').forEach(el=>{
        r[el.dataset.rankField]=el.value;
      });
      rankings.push(r);
    });
    data.rankings=rankings;
  }
  if(S.activeTab===1){
    MTC_SECTION_KEYS.forEach(key=>{
      const inclusion={};
      MTC_MEMBER_STATUSES.forEach(ms=>{
        const includeKey=`${key}_inclusion_${statusFieldKey(ms)}`;
        inclusion[ms]=data[includeKey]||'Included';
      });
      data[key]={
        used:data[`${key}_used`]||'',
        construct:data[`${key}_construct`]||'',
        deviation:data[`${key}_deviation`]||'',
        inclusion,
      };
    });
  }
  return data;
}

async function saveCurrentTab(showToast=true){
  const data=collectTabData();
  const tabName=TABS[S.activeTab];
  try{
    if(S.activeTab===0){
      // Overview tab saves to PUT /api/schemes/{id}
      const body={
        agency:data.agency,scheme_name:data.scheme_name,scheme_code:data.scheme_code,
        valid_from:data.valid_from,valid_to:data.valid_to,
        legislated_or_consent:data.legislated_or_consent,consent_scope:data.consent_scope,
        background_info:{
          org_established:data.bg_org_established,purpose:data.bg_purpose,
          funding_source:data.bg_funding_source,governing_body:data.bg_governing_body,
          eligibility_org:data.bg_eligibility_org,eval_orgs:data.bg_eval_orgs,
          third_parties:data.bg_third_parties,group_name:data.bg_group_name,logo_info:data.bg_logo_info
        }
      };
      await api(`/api/schemes/${S.currentScheme}`,{method:'PUT',body});
    }else{
      await api(`/api/schemes/${S.currentScheme}/tab/${tabName}`,{method:'PUT',body:{data}});
    }
    if(showToast)toast(TAB_LABELS[S.activeTab]+' saved');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

async function saveDraftOnly(){
  await saveCurrentTab(false);
  toast('Draft saved. You can come back later.','info');
}

function renderSlotPanel(d,canEdit){
  const slots=d.onboarding_slots||[];
  const primarySlot=slots.find(s=>!s.is_additional);
  const additionalSlots=slots.filter(s=>s.is_additional);
  const today=new Date();
  const currentYear=today.getFullYear();
  const currentMonth=today.getMonth()+1;
  
  // Determine available years (current year + next 2 years)
  const availableYears=[currentYear,currentYear+1,currentYear+2];
  const selectedYear=S.selectedSlotYear||primarySlot?.year||currentYear;
  S.selectedSlotYear=selectedYear;
  
  // Quarter months
  const quarterMonths=[
    {month:1,name:'January'},
    {month:4,name:'April'},
    {month:7,name:'July'},
    {month:11,name:'November'}
  ];
  
  // Check if month is in past
  const isMonthPast=(year,month)=>{
    if(year<currentYear)return true;
    if(year===currentYear&&month<currentMonth)return true;
    return false;
  };
  
  const isEditingSlot=S.editingSlot===S.currentScheme;
  const canCreatorEditRejectedSlot=hasRole('agency_creator')&&primarySlot?.approval_status==='rejected';
  const canEditSlot=canEdit||canCreatorEditRejectedSlot;
  const canAgencyReviewSlot=hasRole('agency_approver')&&d.status==='pending_review';
  const canMtoApproveSlot=hasRole('mto_admin')&&d.status==='pending_final';

  const getMonthCount=(year,month)=>((S.slotOverviewByYear?.[year]?.[month])||0);
  const getMonthStatus=(year,month)=>{
    const count=getMonthCount(year,month);
    if(count>=4)return {key:'full',label:'Full',className:'bg-red-100 text-red-700 border-red-200',dot:'bg-red-500'};
    if(count===3)return {key:'limited',label:'Limited',className:'bg-amber-100 text-amber-700 border-amber-200',dot:'bg-amber-500'};
    return {key:'available',label:'Available',className:'bg-emerald-100 text-emerald-700 border-emerald-200',dot:'bg-emerald-500'};
  };
  
  return `
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
    <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
      <i class="fas fa-calendar-check mr-1"></i>Onboarding Slot
    </h4>
    
    ${primarySlot&&!isEditingSlot?`
      <!-- Primary Slot Display -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-3">
        <div class="text-sm font-semibold text-blue-900">${primarySlot.slot_month_name} ${primarySlot.year}</div>
        <div class="text-xs text-blue-800 mt-2">
          <i class="fas fa-gears mr-1"></i>Technical: ${primarySlot.technical_go_live}
          <br>
          <i class="fas fa-briefcase mr-1"></i>Business: ${primarySlot.business_go_live}
        </div>
        ${primarySlot.approval_status!=='approved'?`
          <div class="text-xs mt-2 px-2 py-1 rounded ${
            primarySlot.approval_status==='rejected'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'
          }">
            Status: ${primarySlot.approval_status}
            ${primarySlot.approver_comment?'<br><i class="fas fa-comment-dots mr-1"></i>'+esc(primarySlot.approver_comment):''}
          </div>
        `:''}
      </div>
      
      ${canEditSlot&&primarySlot.approval_status==='rejected'?`
        <button onclick="S.editingSlot='${S.currentScheme}';S.selectedSlotYear=${primarySlot.year||selectedYear};S.selectedSlotMonth=${primarySlot.slot_month||'null'};renderDetailContent()" class="w-full text-blue-600 hover:text-blue-700 text-xs font-semibold py-2 transition mb-2">
          <i class="fas fa-edit mr-1"></i>Edit Slot
        </button>
      `:''}
      
      ${canMtoApproveSlot&&primarySlot.approval_status==='pending'?`
        <div class="flex gap-2 mt-2">
          <button onclick="approveSlot()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold py-1.5 rounded transition">
            <i class="fas fa-check mr-1"></i>Approve

          <button onclick="rejectSlotModal()" class="flex-1 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold py-1.5 rounded transition">
            <i class="fas fa-times mr-1"></i>Reject

        </div>
      `:canAgencyReviewSlot&&primarySlot.approval_status==='pending'?`

            return `

// ── APPROVAL ACTIONS ──
function workflowChangeRows(limit=20){
  const all=(S.changes||[])
    .flatMap(c=>normalizeChangeRows(c.changes||[]).map(row=>({
      tab:c.tab_name||'unknown',
      field:displayFieldName(row.field,c.tab_name||''),
      old:fmtChangeValue(row.old),
      next:fmtChangeValue(row.new),
      timestamp:c.timestamp||''
    })))
    .filter(r=>r.old!==r.next);
  return all.slice(0,limit);
}

function confirmWorkflowAction(action){
  const map={
    submit:{title:'Confirm Submit for Review',desc:'You are about to move this scheme to Pending Review for agency approvers.',cta:'Confirm Submit',run:'submitScheme'},
    approve:{title:'Confirm Approve & Send to MTO',desc:'You are about to move this scheme to Pending Final for MTO Admin approval.',cta:'Confirm Approve',run:'approveScheme'},
    final_approve:{title:'Confirm Final Approval',desc:'You are about to mark this scheme as Approved.',cta:'Confirm Final Approval',run:'finalApproveScheme'}
  };
  const cfg=map[action];
  if(!cfg)return;
  const rows=workflowChangeRows(25);
  const details=rows.length?`
    <div class="border border-gray-200 rounded-lg overflow-hidden">
      <div class="px-3 py-2 bg-slate-50 text-xs text-slate-600 font-semibold">Recent Saved Changes (${rows.length})</div>
      <div class="max-h-56 overflow-auto">
        <table class="w-full text-xs">
          <thead><tr class="bg-white border-b border-gray-100"><th class="px-2 py-1.5 text-left">Screen</th><th class="px-2 py-1.5 text-left">Field</th><th class="px-2 py-1.5 text-left">Previous</th><th class="px-2 py-1.5 text-left">Changed To</th></tr></thead>
          <tbody>
            ${rows.map(r=>`<tr class="border-b border-gray-50"><td class="px-2 py-1.5 text-slate-600">${esc(r.tab)}</td><td class="px-2 py-1.5 text-slate-700">${esc(r.field)}</td><td class="px-2 py-1.5 text-slate-500">${r.old}</td><td class="px-2 py-1.5 text-slate-700">${r.next}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `:`<div class="rounded-lg border border-amber-200 bg-amber-50 text-amber-700 text-xs px-3 py-2">No saved changes found in the audit log yet. Save tabs first if needed.</div>`;

  openModal(cfg.title,`
    <div class="space-y-4">
      <p class="text-sm text-gray-600">${cfg.desc}</p>
      ${details}
      <div class="rounded-lg border border-gray-200 bg-gray-50 text-xs text-gray-600 px-3 py-2">This summary reflects saved changes from the audit log.</div>
      <div class="flex gap-2">
        <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-semibold transition">Cancel</button>
        <button type="button" onclick="closeModal();${cfg.run}()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-semibold transition">${cfg.cta}</button>
      </div>
    </div>`);
}

function mf(label,name,val,type='text',required=false,tipText=''){
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}${tipText?tip(tipText):''}</label>
    <input type="${type}" name="${name}" value="${esc(String(val||''))}" ${required?'required':''}
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition">
  </div>`;
}
function mta(label,name,val){
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}</label>
    <textarea name="${name}" rows="3" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition">${esc(String(val||''))}</textarea>
  </div>`;
}
function mSelect(label,name,options,val=''){
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}</label>
    <select name="${name}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white transition">
      ${options.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>
  </div>`;
}

function openModal(title,body){
  document.getElementById('modalContent').innerHTML=`
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <h3 class="text-base font-semibold text-brand-900">${title}</h3>
      <button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center transition">
        <i class="fas fa-times text-gray-400"></i>
      </button>
    </div>
    <div class="p-6">${body}</div>`;
  document.getElementById('modalRoot').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalRoot').classList.add('hidden')}

function toggleGlobalHints(){
  S.showHints=!S.showHints;
  localStorage.setItem('homes_showHints',S.showHints);

  // Update current screen quickly without losing context
  if(S.view==='detail'&&S.currentSchemeData){
    // Repaint header icon + detail fields/hints
    document.getElementById('app').innerHTML=renderDetailPage();
    renderDetailContent();
    return;
  }
  if(S.view==='field_management'){
    document.getElementById('app').innerHTML=renderFieldManagementPage();
    renderFieldGuidanceContent();
    return;
  }

  // Fallback for other screens
  render();
}

// ════════════════════════════════════════
// FIELD GUIDANCE HELPERS
// ════════════════════════════════════════

// Show inline hint if enabled
function renderHintText(tab,field){
  if(!S.showHints)return '';
  const g=S.guidance[`${tab}.${field}`];
  if(!g||!g.inline_hint)return '';
  return `<p class="text-xs text-gray-500 mt-1 pl-1">${esc(g.inline_hint)}</p>`;
}

// Show popover on click (?) icon
function showGuidancePopover(tab,field,e){
  e.preventDefault();
  e.stopPropagation();
  const g=S.guidance[`${tab}.${field}`];
  if(!g)return;
  
  const doList=g.popover_do?.length?`<div class="mt-3"><p class="text-xs font-semibold text-emerald-700 mb-1">✅ Do's:</p><ul class="text-xs text-emerald-700 space-y-1">${g.popover_do.map(d=>`<li>• ${esc(d)}</li>`).join('')}</ul></div>`:'';
  const dontList=g.popover_dont?.length?`<div class="mt-3"><p class="text-xs font-semibold text-red-700 mb-1">❌ Don'ts:</p><ul class="text-xs text-red-700 space-y-1">${g.popover_dont.map(d=>`<li>• ${esc(d)}</li>`).join('')}</ul></div>`:'';
  const exList=g.popover_examples?.length?`<div class="mt-3"><p class="text-xs font-semibold text-blue-700 mb-1">💡 Examples:</p><ul class="text-xs text-blue-700 space-y-1">${g.popover_examples.map(ex=>`<li>• ${esc(ex)}</li>`).join('')}</ul></div>`:'';
  
  openModal(g.popover_title||field,`
    <div class="space-y-3">
      ${g.popover_description?`<p class="text-sm text-gray-700">${esc(g.popover_description)}</p>`:''}
      ${doList}${dontList}${exList}
    </div>
  `);
}

// Walkthrough tour for a tab
async function startGuidedTour(tab){
  if(!S.guidanceList.length)await loadFieldGuidance();
  const activeTab=tab||TABS[S.activeTab]||'overview';

  // Only include fields that are actually rendered on the current screen
  const visibleFieldKeys=[...new Set(
    Array.from(document.querySelectorAll('#tabContent [data-field]'))
      .map(el=>String(el.getAttribute('data-field')||'').trim())
      .filter(Boolean)
  )];

  if(!visibleFieldKeys.length){toast('No fields available on this screen','info');return}

  // Build tour items from current screen fields only
  const fields=visibleFieldKeys.map(fieldKey=>{
    const g=S.guidance[`${activeTab}.${fieldKey}`]||{};
    return {
      tab_name: activeTab,
      field_name: fieldKey,
      inline_hint: g.inline_hint||'',
      popover_title: g.popover_title||'',
      popover_description: g.popover_description||'',
      popover_examples: g.popover_examples||[],
      popover_do: g.popover_do||[],
      popover_dont: g.popover_dont||[],
    };
  });

  window.currentTourTab=activeTab;
  window.currentTourFields=fields;
  window.currentTourIdx=0;
  window.currentTourQuery='';
  renderGuidedTourModal();
}

function getFilteredTourIndexes(){
  const fields=window.currentTourFields||[];
  const q=String(window.currentTourQuery||'').trim().toLowerCase();
  if(!q)return fields.map((_,i)=>i);
  return fields
    .map((f,i)=>({f,i}))
    .filter(({f})=>{
      const label=displayFieldName(f.field_name, window.currentTourTab||f.tab_name||'overview').toLowerCase();
      const title=String(f.popover_title||'').toLowerCase();
      const desc=String(f.popover_description||'').toLowerCase();
      return label.includes(q)||title.includes(q)||desc.includes(q);
    })
    .map(x=>x.i);
}

function setTourQuery(val){
  window.currentTourQuery=String(val||'');
  const filtered=getFilteredTourIndexes();
  if(filtered.length){
    if(!filtered.includes(window.currentTourIdx))window.currentTourIdx=filtered[0];
  }
  renderGuidedTourModal();
}

function jumpToTourIndex(idx){
  window.currentTourIdx=idx;
  renderGuidedTourModal();
}

function tourPrev(){
  const filtered=getFilteredTourIndexes();
  if(!filtered.length)return;
  const pos=filtered.indexOf(window.currentTourIdx);
  if(pos>0){
    window.currentTourIdx=filtered[pos-1];
    renderGuidedTourModal();
  }
}

function tourNext(){
  const filtered=getFilteredTourIndexes();
  if(!filtered.length)return;
  const pos=filtered.indexOf(window.currentTourIdx);
  if(pos>=0&&pos<filtered.length-1){
    window.currentTourIdx=filtered[pos+1];
    renderGuidedTourModal();
  }
}

function renderGuidedTourModal(){
  const fields=window.currentTourFields||[];
  const tab=window.currentTourTab||'overview';
  if(!fields.length){toast('No guidance available for this screen','info');return}

  const filtered=getFilteredTourIndexes();
  if(!filtered.length){
    openModal('📖 Guide Me',`
      <div class="space-y-3">
        <input type="text" value="${esc(window.currentTourQuery||'')}" oninput="setTourQuery(this.value)" placeholder="Search field guidance..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"/>
        <div class="text-sm text-gray-500">No guidance matches your search.</div>
        <div class="pt-2 flex justify-end">
          <button onclick="closeModal()" class="px-3 py-2 rounded-lg text-xs bg-gray-100 hover:bg-gray-200 font-medium">Close</button>
        </div>
      </div>
    `);
    return;
  }

  if(!filtered.includes(window.currentTourIdx))window.currentTourIdx=filtered[0];
  const idx=window.currentTourIdx;
  const f=fields[idx];
  const activePos=filtered.indexOf(idx);
  const totalFiltered=filtered.length;

  const doList=f.popover_do?.length?`<div class="mt-3"><p class="text-xs font-semibold text-emerald-700 mb-1">✅ Do's:</p><ul class="text-xs text-emerald-700 space-y-1">${f.popover_do.map(d=>`<li>• ${esc(d)}</li>`).join('')}</ul></div>`:'';
  const dontList=f.popover_dont?.length?`<div class="mt-3"><p class="text-xs font-semibold text-red-700 mb-1">❌ Don'ts:</p><ul class="text-xs text-red-700 space-y-1">${f.popover_dont.map(d=>`<li>• ${esc(d)}</li>`).join('')}</ul></div>`:'';
  const exList=f.popover_examples?.length?`<div class="mt-3"><p class="text-xs font-semibold text-blue-700 mb-1">💡 Examples:</p><ul class="text-xs text-blue-700 space-y-1">${f.popover_examples.map(ex=>`<li>• ${esc(ex)}</li>`).join('')}</ul></div>`:'';

  const guideTitle=f.popover_title||displayFieldName(f.field_name, tab);
  openModal(`📖 Guide: ${guideTitle}`,`
    <div class="space-y-4">
      <div class="flex items-center gap-2">
        <input type="text" value="${esc(window.currentTourQuery||'')}" oninput="setTourQuery(this.value)" placeholder="Search field guidance..." class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm"/>
        <span class="text-xs text-slate-500 px-2 py-1 rounded-md bg-slate-100">${activePos+1}/${totalFiltered}</span>
      </div>

      <div class="grid grid-cols-12 gap-3">
        <div class="col-span-5 border border-gray-200 rounded-lg p-2 max-h-72 overflow-auto bg-slate-50/60">
          ${filtered.map(i=>{
            const item=fields[i];
            const label=displayFieldName(item.field_name, tab);
            const active=i===idx;
            return `<button onclick="jumpToTourIndex(${i})" class="w-full text-left px-2 py-2 rounded-md text-xs mb-1 border transition ${active?'bg-brand-600 text-white border-brand-600':'bg-white text-slate-700 border-slate-200 hover:bg-slate-100'}">${esc(label)}</button>`;
          }).join('')}
        </div>

        <div class="col-span-7">
          <div class="p-3 rounded-lg bg-blue-50 border border-blue-200">
            <p class="text-xs text-blue-700"><strong>Field:</strong> ${esc(displayFieldName(f.field_name, tab))}</p>
            ${f.inline_hint?`<p class="text-xs text-blue-700 mt-1"><strong>Hint:</strong> ${esc(f.inline_hint)}</p>`:''}
          </div>
          <div class="space-y-3 mt-3">
            ${f.popover_description?`<p class="text-sm text-gray-700">${esc(f.popover_description)}</p>`:'<p class="text-sm text-gray-400 italic">No detailed guidance added yet.</p>'}
            ${doList}${dontList}${exList}
          </div>
        </div>
      </div>

      <div class="border-t pt-4 flex items-center gap-2">
        <button onclick="tourPrev()" ${activePos===0?'disabled':''} class="px-3 py-2 rounded-lg text-xs font-medium ${activePos===0?'bg-gray-100 text-gray-400 cursor-not-allowed':'bg-gray-200 hover:bg-gray-300 text-gray-800'}">← Back</button>
        <button onclick="tourNext()" ${activePos===totalFiltered-1?'disabled':''} class="px-3 py-2 rounded-lg text-xs font-medium ${activePos===totalFiltered-1?'bg-slate-100 text-slate-400 cursor-not-allowed':'bg-brand-600 hover:bg-brand-700 text-white'}">Next →</button>
        <button onclick="window.currentTourQuery='';setTourQuery('')" class="px-3 py-2 rounded-lg text-xs bg-white border border-slate-200 hover:bg-slate-50 font-medium">Clear Search</button>
        <button onclick="closeModal();window.currentTourIdx=-1" class="ml-auto px-3 py-2 rounded-lg text-xs bg-gray-100 hover:bg-gray-200 font-medium">Done</button>
      </div>
    </div>
  `);
}

document.addEventListener('DOMContentLoaded', render);

</script>
