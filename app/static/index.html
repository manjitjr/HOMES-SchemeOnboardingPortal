// STATE
// ════════════════════════════════════════
function parseStoredUser(){
  try{return JSON.parse(localStorage.getItem('homes_user')||'null')}
  catch(_){localStorage.removeItem('homes_user');return null}
}

let S={
  token:localStorage.getItem('homes_token')||null,
  user:parseStoredUser(),
  view:'list', // list, detail, users
  schemes:[],
  currentScheme:null,
  currentSchemeData:null,
  activeTab:0,
  comments:[],
  changes:[],
  statusFilter:'all',
  tabData:{},
  allUsers:[],
  agencies:[],
  userAgencyFilter:'all',
  userAgencySearch:'',
  slots:[],
  slotNotifications:[],
  selectedSlotYear:null
};

// Role helpers
function hasRole(...roles){return S.user&&roles.some(r=>(S.user.roles||[]).includes(r))}
function isAdmin(){return hasRole('mto_admin')}

const TABS=['overview','mt_parameters','transactions','homes_functions','mt_bands','api_interfaces'];
const TAB_LABELS=['Scheme Overview','MT Parameters','Transaction Details','HOMES Functions','MT Bands','API & Batch Interfaces'];
const TAB_ICONS=['fa-file-alt','fa-cog','fa-exchange-alt','fa-puzzle-piece','fa-sliders-h','fa-plug'];
// ════════════════════════════════════════
// API
// ════════════════════════════════════════
async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(S.token)h['Authorization']='Bearer '+S.token;
  const res=await fetch(path,{headers:h,...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  if(res.status===204)return null;
  const json=await res.json().catch(()=>null);
  if(!res.ok)throw new Error(json?.detail||json?.message||'Request failed');
  return json;
}

async function ensureAgenciesLoaded(){
  if(S.agencies&&S.agencies.length)return S.agencies;
  try{S.agencies=await api('/api/auth/agencies')}catch(_){S.agencies=[]}
  return S.agencies;
}

function toast(msg,type='success'){
  const d=document.createElement('div');
  const c={success:'bg-emerald-500',error:'bg-red-500',info:'bg-brand-500'};
  d.className=`toast px-4 py-2.5 rounded-lg text-white text-sm font-medium shadow-lg ${c[type]||c.info}`;
  d.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'} mr-2"></i>${msg}`;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>d.remove(),3500);
}

// ════════════════════════════════════════
// AUTH
// ════════════════════════════════════════
async function doLogin(e){
  e.preventDefault();
  const u=e.target.username.value,p=e.target.password.value;
  try{
    const r=await api('/api/auth/login',{method:'POST',body:{username:u,password:p}});
    S.token=r.token;S.user=r.user;
    localStorage.setItem('homes_token',r.token);
    localStorage.setItem('homes_user',JSON.stringify(r.user));
    toast('Welcome, '+S.user.display_name);
    render();
  }catch(err){toast(err.message,'error')}
}

function logout(){
  S.token=null;S.user=null;S.view='list';S.schemes=[];S.currentScheme=null;
  localStorage.removeItem('homes_token');localStorage.removeItem('homes_user');
  render();
}

// ════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════
async function render(){
  try{
    const app=document.getElementById('app');
    if(!S.token||!S.user){app.innerHTML=renderLogin();return}
    if(S.view==='list'){app.innerHTML=renderListPage();loadSchemes();loadSchedulingData()}
    else if(S.view==='detail'){app.innerHTML=renderDetailPage()}
    else if(S.view==='scheduling'){app.innerHTML=renderSchedulingPage()}
    else if(S.view==='users'){await ensureAgenciesLoaded();app.innerHTML=renderUsersPage();loadUsers()}
  }catch(e){
    console.error('Render error:', e);
    document.getElementById('app').innerHTML=`<div style="padding:20px;color:red;font-family:monospace"><strong>Error:</strong> ${e.message}</div>`;
  }
}

// ── STATUS BADGE ──
function statusBadge(st){
  const m={draft:['Draft','bg-amber-50 text-amber-700 border-amber-200'],
    pending_review:['Pending Review','bg-blue-50 text-blue-700 border-blue-200'],
    pending_final:['Pending Final','bg-indigo-50 text-indigo-700 border-indigo-200'],
    approved:['Approved','bg-emerald-50 text-emerald-700 border-emerald-200'],
    rejected:['Rejected','bg-red-50 text-red-700 border-red-200']};
  const[label,cls]=m[st]||[st,'bg-gray-100 text-gray-600 border-gray-200'];
  return `<span class="px-2.5 py-1 rounded-full text-xs font-medium border ${cls}">${label}</span>`;
}

      </div>
      ${hasRole('agency_creator')?`
      <button onclick="createNewScheme()" class="btn-primary text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow-sm transition">
        <i class="fas fa-plus mr-2"></i>New Scheme
      </button>`:''}
    </div>
    <div id="schedulePanel" class="mb-6"></div>
    <div class="flex gap-2 mb-4" id="filterBar">
      ${['all','draft','pending_review','pending_final','approved','rejected'].map(f=>
        `<button onclick="S.statusFilter='${f}';filterSchemes()" class="px-3 py-1.5 rounded-lg text-xs font-medium transition ${S.statusFilter===f?'bg-brand-600 text-white':'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}">${f==='all'?'All':f.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</button>`
      ).join('')}
    </div>
    <div id="schemeTable" class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
      <div class="px-5 py-8 text-center text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Loading schemes...</div>
    </div>
  </div>`;
}

async function loadSchemes(){
  try{
    S.schemes=await api('/api/schemes');
    renderSchemeTable();
  }catch(e){
    document.getElementById('schemeTable').innerHTML=`<div class="px-5 py-8 text-center text-red-500 text-sm">${e.message}</div>`;
  }
}

function filterSchemes(){
  document.querySelectorAll('#filterBar button').forEach((b,i)=>{
    const f=['all','draft','pending_review','pending_final','approved','rejected'][i];
    b.className=`px-3 py-1.5 rounded-lg text-xs font-medium transition ${S.statusFilter===f?'bg-brand-600 text-white':'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
  });
  renderSchemeTable();
}

function renderSchemeTable(){
  const filtered=S.statusFilter==='all'?S.schemes:S.schemes.filter(s=>s.status===S.statusFilter);
  const showDelete=isAdmin();
  const el=document.getElementById('schemeTable');
  if(!filtered.length){el.innerHTML='<div class="px-5 py-8 text-center text-gray-400 text-sm">No schemes found</div>';return}
  el.innerHTML=`
  <table class="w-full text-sm">
    <thead><tr class="bg-surface-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
      <th class="px-5 py-3">Scheme</th><th class="px-5 py-3">Code</th><th class="px-5 py-3">Agency</th>
      <th class="px-5 py-3">Status</th><th class="px-5 py-3">Version</th><th class="px-5 py-3">Updated</th>
      ${showDelete?'<th class="px-5 py-3 text-right">Actions</th>':''}
    </tr></thead>
    <tbody class="divide-y divide-gray-50">
      ${filtered.map(s=>`
      <tr class="hover:bg-surface-50 transition cursor-pointer" onclick="openScheme('${s.id}')">
        <td class="px-5 py-3 font-medium text-gray-800">${esc(s.scheme_name||'Untitled')}</td>
        <td class="px-5 py-3 text-gray-500 font-mono text-xs">${esc(s.scheme_code||'-')}</td>
        <td class="px-5 py-3 text-gray-500">${esc(s.agency||'-')}</td>
        <td class="px-5 py-3">${statusBadge(s.status)}</td>
        <td class="px-5 py-3 text-gray-500">${s.version||1}</td>
        <td class="px-5 py-3 text-gray-400 text-xs">${s.updated_at?new Date(s.updated_at).toLocaleDateString():'-'}</td>
        ${showDelete?`<td class="px-5 py-3 text-right">
          <button onclick="event.stopPropagation();deleteScheme('${s.id}')" class="text-red-500 hover:text-red-700 text-xs font-semibold" title="Delete scheme">
            <i class="fas fa-trash mr-1"></i>Delete
          </button>
        </td>`:''}
      </tr>`).join('')}
    </tbody>
  </table>`;
}

async function deleteScheme(schemeId){
  if(!isAdmin()){toast('Only MTO Admin can delete schemes','error');return}
  const scheme=S.schemes.find(x=>x.id===schemeId);
  const name=scheme?.scheme_name||'this scheme';
  openModal('Confirm Delete Scheme',`
    <div class="space-y-4">
      <div class="bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-700">
        <i class="fas fa-triangle-exclamation mr-2"></i>
        You are about to delete <strong>${esc(name)}</strong>. This action cannot be undone.
      </div>
      <div class="flex gap-2">
        <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-semibold transition">Cancel</button>
        <button onclick="doDeleteScheme('${schemeId}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg text-sm font-semibold transition">
          <i class="fas fa-trash mr-1"></i>Delete Permanently
        </button>
      </div>
    </div>`);
}

async function doDeleteScheme(schemeId){
  try{
    await api(`/api/schemes/${schemeId}`,{method:'DELETE'});
    closeModal();
    toast('Scheme deleted');
    await loadSchemes();
  }catch(e){toast(e.message,'error')}
}

async function loadSchedulingData(){
  // This function used to load scheduling data, but now slot selection is integrated into schemes
  // Keep it minimal to avoid errors
  const panel=document.getElementById('schedulePanel');

  try{
    // Slot selection is now part of scheme detail, so nothing to load here

function fmtDateTime(iso){
  if(!iso)return '-';
  const d=new Date(iso);
  return d.toLocaleString([], {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function fmtDate(iso){
  if(!iso)return '-';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString([], {year:'numeric',month:'short',day:'numeric'});
}

async function submitNewScheme(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  const body=Object.fromEntries(fd.entries());
  // background_info as JSON object
  if(body.background_info){
    try{body.background_info={notes:body.background_info}}catch(e){}
  } else { delete body.background_info; }
  try{
    const r=await api('/api/schemes',{method:'POST',body});
    toast('Scheme created in draft mode');
    closeModal();
    S.currentScheme=r.id;
    S.currentSchemeData=null;
    S.comments=[];
    S.changes=[];
    S.activeTab=0;
    S.tabData={};
    S.view='detail';
    render();
    await loadSchemeDetail();
  }catch(err){toast(err.message,'error')}
}

    const code=(u.agency||'').toLowerCase();

    return code.includes(search)||name.includes(search);

    <tbody class="divide-y divide-gray-50">

        <td class="px-5 py-3">

function renderSchedulingOverview(data){
  const content=document.getElementById('schedulingContent');
  if(!content)return;
  
  // Color mapping for quarters - hardcoded for Tailwind safety
  const getQuarterClass=(month)=>{
    const colorMap={
      'January':{bg:'bg-blue-50',border:'border-blue-200',text:'text-blue-900',card:'bg-blue-50 border-blue-100'},
      'April':{bg:'bg-purple-50',border:'border-purple-200',text:'text-purple-900',card:'bg-purple-50 border-purple-100'},
      'July':{bg:'bg-green-50',border:'border-green-200',text:'text-green-900',card:'bg-green-50 border-green-100'},
      'November':{bg:'bg-orange-50',border:'border-orange-200',text:'text-orange-900',card:'bg-orange-50 border-orange-100'}
    };
    return colorMap[month]||{bg:'bg-gray-50',border:'border-gray-200',text:'text-gray-900',card:'bg-gray-50 border-gray-100'};
  };
  
  content.innerHTML=data.quarters.map(q=>{
    const colors=getQuarterClass(q.month_name);
    return `
    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
      <div class="${colors.bg} ${colors.border} border-b px-4 py-3">
        <h3 class="font-semibold ${colors.text}">${q.month_name}</h3>
      </div>
      <div class="p-4 space-y-3 max-h-96 overflow-y-auto">
        ${q.bookings.length===0?
          `<p class="text-xs text-gray-400 text-center py-4">No bookings</p>`
          :q.bookings.map(b=>`
            <div class="border rounded p-3 ${colors.card}">
              <div class="font-semibold text-sm text-gray-800">${esc(b.scheme_name||'Unknown')}</div>
              <div class="text-xs text-gray-600 mt-1">${esc(b.agency||'')}</div>
              <div class="text-xs text-gray-500 mt-2">
                <i class="fas fa-gears mr-1"></i>Tech: ${b.technical_go_live}
                <br>
                <i class="fas fa-briefcase mr-1"></i>Biz: ${b.business_go_live}
              </div>
              ${isAdmin()&&b.submission_id?`
                <div class="mt-3 pt-2 border-t border-gray-200">
                  <button onclick="confirmDeleteScheduleScheme('${b.submission_id}','${esc((b.scheme_name||'Unknown').replace(/'/g,"\\'"))}')" class="text-red-600 hover:text-red-700 text-xs font-semibold">
                    <i class="fas fa-trash mr-1"></i>Delete Scheme
                  </button>
                </div>
              `:''}
            </div>
          `).join('')
        }
      </div>
    </div>
    `;
  }).join('');
}

function renderDetailContent(){

    (hasRole('mto_admin')) ||
    (hasRole('agency_creator')&&(d.status==='draft'||d.status==='rejected')) ||
    (hasRole('agency_approver')&&(d.status==='pending_review'||d.status==='rejected'));

  document.getElementById('detailBody').innerHTML=`

      ${showDraftTools?`
      <div class="mb-4 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
        <div class="flex items-start justify-between gap-4">
          <div>
            <div class="text-sm font-semibold text-amber-900"><i class="fas fa-file-pen mr-2"></i>Draft Mode</div>

          <i class="fas ${TAB_ICONS[i]} mr-1.5 text-xs"></i>${t}
          ${tabHasData(i)?'<i class="fas fa-check-circle text-emerald-500 ml-1.5 text-xs"></i>':''}
        </button>`).join('')}
      </div>
      <div id="tabContent" class="bg-white rounded-xl border border-gray-100 shadow-sm p-6"></div>
      ${canEdit?`<div class="mt-4 flex justify-end gap-2">
        ${showDraftTools?`<button onclick="saveDraftOnly()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-semibold transition">
          <i class="fas fa-save mr-2"></i>Save Draft

          <i class="fas fa-save mr-2"></i>Save Tab
        </button>

    <div class="w-80 flex-shrink-0 space-y-4">
      ${renderSlotPanel(d,canEdit)}
      ${renderApprovalPanel(d,canEdit)}
    </div>
  </div>`;

  renderTabContent();
}

function tabHasData(i){
  const d=S.currentSchemeData;if(!d)return false;
  if(i===0)return !!(d.agency||d.scheme_name);
  const tn=TABS[i];
  return d[tn]&&typeof d[tn]==='object'&&Object.keys(d[tn]).length>0;
}

function switchTab(i){S.activeTab=i;
  document.querySelectorAll('.tab-btn').forEach((b,j)=>{b.classList.toggle('active',j===i)});
  renderTabContent();
}

function isReadOnly(){
  const d=S.currentSchemeData;
  if(!d)return true;
  if(hasRole('mto_admin'))return false;
  if(hasRole('agency_creator')&&(d.status==='draft'||d.status==='rejected'))return false;
  if(hasRole('agency_approver')&&(d.status==='pending_review'||d.status==='rejected'))return false;
  return true;
}

function ro(){return isReadOnly()?'disabled':''}

// ════════════════════════════════════════
// TAB RENDERERS
// ════════════════════════════════════════
function renderTabContent(){
  const el=document.getElementById('tabContent');
  if(!el)return;
  const fns=[renderTab0,renderTab1,renderTab2,renderTab3,renderTab4,renderTab5];
  el.innerHTML=fns[S.activeTab]();
}

// Helper: info tooltip
function tip(text){
  if(!text)return '';
  return `<span class="tooltip-trigger relative inline-block ml-1 cursor-help">
    <i class="fas fa-info-circle text-brand-400 text-xs"></i>
    <span class="tooltip-box hidden absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 bg-white border border-gray-200 rounded-lg shadow-lg text-xs text-gray-600 font-normal z-30">${esc(text)}</span>
  </span>`;
}

// Helper: form field
function ff(label,key,val,type='text',tipText='',extra=''){
  const v=val??'';const r=ro();
  return `<div class="${extra}">
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}${tip(tipText)}</label>
    <input type="${type}" data-field="${key}" value="${esc(String(v))}" ${r}
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition disabled:bg-gray-50 disabled:text-gray-500" ${type==='number'?'step="any"':''}>
  </div>`;
}

function fta(label,key,val,tipText='',rows=3){
  const v=val??'';const r=ro();
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}${tip(tipText)}</label>
    <textarea data-field="${key}" rows="${rows}" ${r}
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition disabled:bg-gray-50 disabled:text-gray-500">${esc(String(v))}</textarea>
  </div>`;
}

function fsel(label,key,options,val,tipText=''){
  const r=ro();
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}${tip(tipText)}</label>
    <select data-field="${key}" ${r} class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white transition disabled:bg-gray-50 disabled:text-gray-500">
      <option value="">-- Select --</option>
      ${options.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>
  </div>`;
}

function fyn(label,key,val,tipText=''){
  return fsel(label,key,['Yes','No'],val,tipText);
}

function sectionHead(title,icon){
  return `<div class="flex items-center gap-2 pt-6 pb-3 border-b border-gray-100 mb-4 first:pt-0">
    <i class="fas ${icon||'fa-folder'} text-brand-500 text-sm"></i>
    <h3 class="text-sm font-semibold text-brand-900">${title}</h3>
  </div>`;
}

function getTabData(tabName){
  const d=S.currentSchemeData;
  if(!d)return {};
  if(tabName==='overview')return d;
  // Ensure tab data object persists so mutations (addBandRow etc.) are kept
  if(!d[tabName]||typeof d[tabName]!=='object')d[tabName]={};
  return d[tabName];
}

function collectTabData(){
  const data={};
  // Standard fields
  document.querySelectorAll('#tabContent [data-field]').forEach(el=>{
    const k=el.dataset.field;
    if(el.tagName==='SELECT')data[k]=el.value;
    else if(el.type==='checkbox')data[k]=el.checked;
    else data[k]=el.value;
  });
  // Band rows
  if(S.activeTab===4){
    const bands=[];
    document.querySelectorAll('#bandsBody tr[data-band]').forEach(tr=>{
      const b={};
      tr.querySelectorAll('[data-band-field]').forEach(el=>{
        b[el.dataset.bandField]=el.tagName==='SELECT'?el.value:el.value;
      });
      bands.push(b);
    });
    data.bands=bands;
    const rankings=[];
    document.querySelectorAll('#rankingsBody tr[data-rank]').forEach(tr=>{
      const r={};
      tr.querySelectorAll('[data-rank-field]').forEach(el=>{
        r[el.dataset.rankField]=el.value;
      });
      rankings.push(r);
    });
    data.rankings=rankings;
  }
  return data;
}

async function saveCurrentTab(showToast=true){
  const data=collectTabData();
  const tabName=TABS[S.activeTab];
  try{
    if(S.activeTab===0){
      // Overview tab saves to PUT /api/schemes/{id}
      const body={
        agency:data.agency,scheme_name:data.scheme_name,scheme_code:data.scheme_code,
        legislated_or_consent:data.legislated_or_consent,consent_scope:data.consent_scope,
        background_info:{
          org_established:data.bg_org_established,purpose:data.bg_purpose,
          funding_source:data.bg_funding_source,governing_body:data.bg_governing_body,
          eligibility_org:data.bg_eligibility_org,eval_orgs:data.bg_eval_orgs,
          third_parties:data.bg_third_parties,group_name:data.bg_group_name,logo_info:data.bg_logo_info
        }
      };
      await api(`/api/schemes/${S.currentScheme}`,{method:'PUT',body});
    }else{
      await api(`/api/schemes/${S.currentScheme}/tab/${tabName}`,{method:'PUT',body:{data}});
    }
    if(showToast)toast(TAB_LABELS[S.activeTab]+' saved');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

async function saveDraftOnly(){
  await saveCurrentTab(false);
  toast('Draft saved. You can come back later.','info');
}

// ── SLOT MANAGEMENT ──
async function saveSlot(){
  const year=parseInt(document.getElementById('slotYear')?.value);
  const slotMonth=S.selectedSlotMonth;
  const techDate=document.getElementById('slotTechDate')?.value;
  const bizDate=document.getElementById('slotBizDate')?.value;
  
  if(!year||!slotMonth||!techDate||!bizDate){
    toast('Please fill in all fields','error');
    return;
  }
  
  try{
    await api(`/api/schemes/${S.currentScheme}/slot`,{
      method:'PUT',
      body:{year,slot_month:slotMonth,technical_go_live:techDate,business_go_live:bizDate}
    });
    toast('Slot saved');
    S.selectedSlotMonth=null;
    S.editingSlot=null;
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

async function approveSlot(){
  try{
    await api(`/api/schemes/${S.currentScheme}/slot/approve`,{
      method:'POST',
      body:{approval_status:'approved'}
    });
    toast('Slot approved');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

    <p class="text-sm text-gray-600">Suggest a different onboarding slot, e.g., "Please select July instead of April"</p>
    <textarea id="slotRejectComment" rows="3" placeholder="Feedback on the selected slot..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition"></textarea>
    <button onclick="doRejectSlot()" class="w-full bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-lg text-sm font-semibold transition">
      <i class="fas fa-times mr-2"></i>Reject Slot
    </button>
  </div>`);
}

async function doRejectSlot(){
  const comment=document.getElementById('slotRejectComment').value;
  try{
    await api(`/api/schemes/${S.currentScheme}/slot/approve`,{
      method:'POST',
      body:{approval_status:'rejected',approver_comment:comment}
    });
    toast('Slot rejected with feedback');
    closeModal();
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

// ── APPROVAL ACTIONS ──
async function submitScheme(){
  try{
    await api(`/api/schemes/${S.currentScheme}/submit`,{method:'POST'});
    toast('Scheme submitted for approval');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

async function approveScheme(){
  try{
    await api(`/api/schemes/${S.currentScheme}/approve`,{method:'POST'});
    toast('Scheme approved');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

async function finalApproveScheme(){
  try{
    await api(`/api/schemes/${S.currentScheme}/final-approve`,{method:'POST'});
    toast('Scheme final approved');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

function showRejectModal(){
  const rejectTarget=hasRole('mto_admin')?'agency approver':'creator';
  openModal('Reject Scheme',`
  <div class="space-y-4">
    <p class="text-sm text-gray-600">Please provide a reason for rejecting this scheme back to the ${rejectTarget}.</p>
    <textarea id="rejectReason" rows="4" placeholder="Rejection reason or slot suggestion (e.g., 'Please pick July instead')..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition"></textarea>
    <p class="text-xs text-gray-500">This comment will be visible in the slot feedback.</p>
    <button onclick="doReject()" class="w-full bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-lg text-sm font-semibold transition">
      <i class="fas fa-times mr-2"></i>Confirm Rejection
    </button>
  </div>`);
}

async function doReject(){
  const comment=document.getElementById('rejectReason').value;
  try{
    await api(`/api/schemes/${S.currentScheme}/reject`,{method:'POST',body:{comment}});
    toast('Scheme rejected');
    closeModal();
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

async function addComment(){
  const el=document.getElementById('commentInput');
  const text=el.value.trim();
  if(!text)return;
  try{
    await api(`/api/schemes/${S.currentScheme}/comments`,{method:'POST',body:{text,stage:S.currentSchemeData?.status}});
    el.value='';
    toast('Comment added');
    await loadSchemeDetail();
  }catch(e){toast(e.message,'error')}
}

// ════════════════════════════════════════
// COLLAPSIBLE
// ════════════════════════════════════════
function toggleCollapsible(btn){
  const body=btn.nextElementSibling;
  const icon=btn.querySelector('.collapsible-icon');
  body.classList.toggle('open');
  if(icon)icon.style.transform=body.classList.contains('open')?'rotate(90deg)':'';
}

// ════════════════════════════════════════
// CONSENT SCOPE TOGGLE
// ════════════════════════════════════════
document.addEventListener('change',function(e){
  if(e.target.dataset?.field==='legislated_or_consent'){
    const wrap=document.getElementById('consentScopeWrap');
    if(wrap)wrap.classList.toggle('hidden',e.target.value!=='Consent');
  }
});

// ════════════════════════════════════════
// MODAL
// ════════════════════════════════════════
function mf(label,name,val,type='text',required=false,tipText=''){
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}${tipText?tip(tipText):''}</label>
    <input type="${type}" name="${name}" value="${esc(String(val||''))}" ${required?'required':''}
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition">
  </div>`;
}
function mta(label,name,val){
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}</label>
    <textarea name="${name}" rows="3" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm transition">${esc(String(val||''))}</textarea>
  </div>`;
}
function mSelect(label,name,options,val=''){
  return `<div>
    <label class="block text-xs font-medium text-gray-600 mb-1">${label}</label>
    <select name="${name}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white transition">
      ${options.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>
  </div>`;
}

function openModal(title,body){
  document.getElementById('modalContent').innerHTML=`
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <h3 class="text-base font-semibold text-brand-900">${title}</h3>
      <button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center transition">
        <i class="fas fa-times text-gray-400"></i>
      </button>
    </div>
    <div class="p-6">${body}</div>`;
  document.getElementById('modalRoot').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalRoot').classList.add('hidden')}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded', render);

</script>
